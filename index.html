<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dihhscord</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://kit.fontawesome.com/2d8a35591c.js" crossorigin="anonymous"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- LOGIN -->
  <section class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="logo-box">
        <i class="fa-solid fa-comments"></i>
      </div>
      <h1>Dihhscord</h1>
      <p class="login-sub">Feed-style global + room based chat with images, reactions, invite links and private rooms.</p>

      <div class="input-wrap">
        <i class="fa-solid fa-user"></i>
        <input type="text" id="usernameInput" placeholder="Enter display name" maxlength="20" />
      </div>

      <button id="loginButton" class="primary-btn">
        <i class="fa-solid fa-arrow-right-to-bracket"></i> Join Chat
      </button>
    </div>
  </section>

  <!-- APP -->
  <section class="app-screen hidden" id="chatScreen">
    <div class="app-layout">

      <!-- MOBILE TOPBAR -->
      <div class="mobile-topbar">
        <button id="mobileSidebarToggle" class="icon-btn">
          <i class="fa-solid fa-bars"></i>
        </button>
        <div class="mobile-room-name" id="mobileRoomTitle"># global</div>
        <button id="logoutButtonMobile" class="icon-btn">
          <i class="fa-solid fa-right-from-bracket"></i>
        </button>
      </div>

      <!-- SIDEBAR OVERLAY -->
      <div class="sidebar-overlay" id="sidebarOverlay"></div>

      <!-- SIDEBAR -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-top">
          <div class="brand">
  <div class="brand-icon"><i class="fa-solid fa-bolt"></i></div>
  <div>
    <h2>Dihhscord</h2>
    <p>Public rooms</p>
    <p class="subline">Global feed & custom rooms</p>
  </div>
</div>

          <button id="closeSidebarBtn" class="icon-btn mobile-only">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <div class="sidebar-card">
          <p class="card-title">You</p>
          <div class="user-card">
            <div class="avatar" id="sidebarAvatar">Y</div>
            <div>
              <div class="username" id="currentUser">Username</div>
              <div class="subline"><span class="online-dot"></span> Online</div>
            </div>
          </div>
        </div>

        <div class="sidebar-card grow-card">
          <div class="rooms-header">
            <p class="card-title">Rooms</p>
            <div class="rooms-actions">
              <button id="joinInviteBtn" class="mini-btn" title="Join via invite">
                <i class="fa-solid fa-link"></i>
              </button>
              <button id="createRoomBtn" class="mini-btn" title="Create room">
                <i class="fa-solid fa-plus"></i>
              </button>
            </div>
          </div>

          <!-- CREATE ROOM -->
          <div class="create-room-box hidden" id="createRoomBox">
            <input type="text" id="newRoomInput" placeholder="Room name..." maxlength="20" />
            <select id="roomPrivacySelect">
              <option value="public">Public Room</option>
              <option value="private">Private Room</option>
            </select>
            <input type="password" id="roomPasswordInput" class="hidden" placeholder="Room password..." maxlength="30" />
            <button id="confirmCreateRoomBtn" class="primary-btn small-btn">Create Room</button>
          </div>

          <!-- JOIN INVITE -->
          <div class="create-room-box hidden" id="joinInviteBox">
            <input type="text" id="inviteLinkInput" placeholder="Paste invite link or code..." />
            <button id="confirmJoinInviteBtn" class="primary-btn small-btn">Join Room</button>
          </div>

          <div id="roomsList" class="rooms-list"></div>
        </div>

        <div class="sidebar-card">
          <div class="rooms-header">
            <p class="card-title">Online</p>
            <span class="pill" id="userCount">0</span>
          </div>
          <div id="onlineUsersList" class="online-users-list"></div>
        </div>
      </aside>

      <!-- MAIN -->
      <main class="chat-main">
        <header class="chat-header">
          <div class="room-meta">
            <div class="room-icon"><i class="fa-solid fa-hashtag"></i></div>
            <div>
              <h3 id="roomTitle">global</h3>
              <p id="roomSubtitle">Global room</p>
            </div>
          </div>

          <div class="header-actions">
            <button id="copyInviteBtn" class="ghost-btn">
              <i class="fa-solid fa-link"></i> Invite
            </button>
            <button id="logoutButton" class="ghost-btn desktop-only">
              <i class="fa-solid fa-right-from-bracket"></i> Leave
            </button>
          </div>
        </header>

        <div class="messages-area">
          <div class="msg-container" id="msgContainer"></div>

          <div class="typing-wrap">
            <div class="typing-indicator hidden" id="typingIndicator">
              <div class="typing-bubble">
                <span id="typingText">Someone is typing...</span>
              </div>
            </div>
          </div>
        </div>

        <!-- EMOJI BAR -->
        <div class="emoji-bar hidden" id="emojiBar">
          <button class="emoji-btn">😀</button>
          <button class="emoji-btn">😂</button>
          <button class="emoji-btn">😍</button>
          <button class="emoji-btn">🔥</button>
          <button class="emoji-btn">💀</button>
          <button class="emoji-btn">😭</button>
          <button class="emoji-btn">😎</button>
          <button class="emoji-btn">❤️</button>
          <button class="emoji-btn">👍</button>
          <button class="emoji-btn">👀</button>
          <button class="emoji-btn">🤝</button>
          <button class="emoji-btn">✨</button>
        </div>

        <!-- COMPOSER -->
        <div class="composer">
          <button class="icon-btn" id="toggleEmojiBtn" title="Emoji">
            <i class="fa-regular fa-face-smile"></i>
          </button>

          <label class="icon-btn file-btn" title="Upload image">
            <i class="fa-regular fa-image"></i>
            <input type="file" id="imageInput" accept="image/*" hidden />
          </label>

          <input type="text" id="messageInput" placeholder="Type a message..." maxlength="500" />

          <button class="send-btn" id="sendButton">
            <i class="fa-solid fa-paper-plane"></i>
          </button>
        </div>
      </main>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
