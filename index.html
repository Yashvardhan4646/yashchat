<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YashChat • Anyone Can Chat</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://kit.fontawesome.com/2d8a35591c.js" crossorigin="anonymous"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-bg"></div>

  <!-- LOGIN -->
  <section class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="brand-badge">
        <i class="fa-solid fa-comments"></i>
      </div>

      <h1>YashChat</h1>
      <p class="login-subtitle">Public real-time chat, but prettier and less broken.</p>

      <div class="login-input-wrap">
        <i class="fa-solid fa-user"></i>
        <input
          type="text"
          id="usernameInput"
          placeholder="Choose a display name"
          maxlength="20"
          autocomplete="off"
        />
      </div>

      <button id="loginButton" class="primary-btn">
        <i class="fa-solid fa-arrow-right-to-bracket"></i>
        Start Chatting
      </button>

      <p class="login-note">
        By joining, you agree to basic human decency. Rare, I know.
      </p>
    </div>
  </section>

  <!-- CHAT -->
  <section class="chat-screen hidden" id="chatScreen">
    <div class="chat-layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-top">
          <div class="logo-wrap">
            <div class="logo-circle">
              <i class="fa-solid fa-bolt"></i>
            </div>
            <div>
              <h2>YashChat</h2>
              <p>Global room</p>
            </div>
          </div>
        </div>

        <div class="sidebar-card">
          <p class="sidebar-label">You</p>
          <div class="current-user-card">
            <div class="avatar" id="sidebarAvatar">Y</div>
            <div>
              <div class="username" id="currentUser">Username</div>
              <div class="status online-dot-text">
                <span class="dot online"></span> Online
              </div>
            </div>
          </div>
        </div>

        <div class="sidebar-card">
          <div class="online-header">
            <p class="sidebar-label">Online Now</p>
            <span class="online-count-pill" id="userCount">0</span>
          </div>
          <div id="onlineUsersList" class="online-users-list"></div>
        </div>
      </aside>

      <!-- Main Chat -->
      <main class="chat-main">
        <header class="chat-header">
          <div class="chat-room-info">
            <div class="room-icon">
              <i class="fa-solid fa-hashtag"></i>
            </div>
            <div>
              <h3>global-chat</h3>
              <p>Talk to anyone. Try not to start a war.</p>
            </div>
          </div>

          <button class="ghost-btn" id="logoutButton" title="Logout">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span>Leave</span>
          </button>
        </header>

        <div class="messages-wrapper" id="messagesWrapper">
          <div class="msg-container" id="msgContainer"></div>

          <div class="typing-wrap" id="typingWrap">
            <div class="typing-indicator hidden" id="typingIndicator">
              <div class="typing-avatar" id="typingAvatar">U</div>
              <div class="typing-bubble">
                <span id="typingText">Someone is typing</span>
                <div class="typing-dots">
                  <span></span><span></span><span></span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="composer">
          <button class="icon-btn" type="button" title="Emoji (future suffering)">
            <i class="fa-regular fa-face-smile"></i>
          </button>

          <input
            type="text"
            id="messageInput"
            placeholder="Type a message..."
            autocomplete="off"
            maxlength="500"
          />

          <button class="send-btn" id="sendButton" type="button" title="Send message">
            <i class="fa-solid fa-paper-plane"></i>
          </button>
        </div>
      </main>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
